<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoffeeDex</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#ffcb05" />
    <link rel="apple-touch-icon" href="./images/data1.png" />

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1;
      }

      /* Bottom Panel */
      .bottom-panel {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        z-index: 999;
        overflow: hidden;
        max-height: 40%;
      }
      .drag-handle {
        width: 50px;
        height: 5px;
        background: #ccc;
        border-radius: 3px;
        margin: 8px auto;
      }
      .panel-title {
        text-align: center;
        font-weight: bold;
        padding: 5px 0;
        font-size: 16px;
      }
      .list {
        overflow-y: auto;
        max-height: 250px;
        min-height: 100px;
        touch-action: pan-y;
      }
      .item {
        display: flex;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: 0.2s;
      }
      .item:last-child {
        border-bottom: none;
      }
      .item:hover {
        background: #f0f0f0;
      }
      .item img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin-right: 10px;
        object-fit: cover;
      }
      .item div {
        flex: 1;
      }
      .item h4 {
        margin: 0;
        font-size: 14px;
        font-weight: bold;
      }
      .item p {
        margin: 2px 0 0;
        font-size: 12px;
        color: #555;
      }

      /* Search + Controls Bar */
      .search-box {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 420px;
        z-index: 1000;
        /* background: rgba(255, 255, 255, 0.95); */
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        /* padding: 8px; */
        backdrop-filter: blur(8px);
      }
      .search-input {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 15px;
        padding: 8px 12px;
        box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.12);
        transition: 0.2s;
      }
      .search-input:focus-within {
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }
      .search-input input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 14px;
        padding: 6px 8px;
        background: transparent;
      }
      .search-input .icon {
        width: 20px;
        height: 20px;
        color: #666;
        margin-right: 6px;
      }
      #clearSearch {
        border: none;
        background: none;
        font-size: 16px;
        cursor: pointer;
        color: #888;
        display: none;
      }
      #clearSearch:hover {
        color: #000;
      }

      .burger-btn {
        border: none;
        background: transparent;
        color: #2f80ed;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
        margin-right: 6px;
      }
      .control-buttons {
        max-height: 0;
        overflow: hidden;
        display: flex;
        opacity: 0;
        flex-wrap: wrap;
        justify-content: space-between;
        padding: 0 6px;
        transition:
          max-height 0.25s ease,
          opacity 0.25s ease,
          padding 0.25s ease;
      }
      .control-buttons.open {
        max-height: 140px;
        opacity: 1;
        padding: 6px;
      }
      .control-buttons button {
        flex: 1;
        margin: 2px;
        border: none;
        background: #2f80ed;
        color: white;
        border-radius: 12px;
        padding: 6px;
        cursor: pointer;
        font-size: 12px;
        transform: translateY(-4px);
        transition: transform 0.2s ease;
      }
      .control-buttons.open button {
        transform: translateY(0);
      }
      .control-buttons button:hover {
        background: #1f64d2;
      }

      .status-text {
        text-align: center;
        font-size: 11px;
        color: #444;
        padding-bottom: 4px;
      }

      .leaflet-popup-content-wrapper {
        border-radius: 14px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        border: 1px solid #e1e8ef;
        padding: 8px;
      }
      .leaflet-popup-tip-container {
        width: 35px;
        height: 20px;
      }
      .leaflet-popup-tip {
        background: #fff;
        border: 1px solid #e1e8ef;
      }
      .leaflet-popup {
        margin-bottom: 70px !important;
      }
      .leaflet-popup-content {
        color: #333;
        font-size: 13px;
        line-height: 1.35;
      }
      .leaflet-popup-content img {
        border-radius: 10px;
      }
      .leaflet-popup-content-wrapper::before {
        content: "";
        position: absolute;
        top: -9px;
        left: 50%;
        transform: translateX(-50%);
        width: 14px;
        height: 14px;
        background: #2f80ed;
        border-radius: 50%;
        border: 2px solid #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        z-index: 9;
      }
      .leaflet-popup-content {
        padding-top: 0;
      }
      .popup-logo-marker {
        z-index: 11;
      }

      /* Update Marker Icon */
      .coffee-icon {
        width: 45px !important;
        height: 45px !important;
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        background-color: white;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .coffee-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Efek Pokemon: Abu-abu jika belum dikunjungi */
      .not-visited {
        filter: grayscale(100%) brightness(0.7);
        border: 3px solid #666;
        opacity: 0.8;
      }

      /* Tambahan Progress Bar di atas List */
      .progress-container {
        padding: 10px 15px;
        background: #f8f9fa;
        border-bottom: 1px solid #eee;
      }

      .progress-bar-bg {
        width: 100%;
        height: 10px;
        background: #e0e0e0;
        border-radius: 5px;
        margin-top: 5px;
      }

      .progress-fill {
        height: 100%;
        background: #ffcb05; /* Warna Kuning Pokemon */
        width: 0%;
        border-radius: 5px;
        transition: width 0.5s ease-in-out;
      }
    </style>
  </head>

  <body>
    <div class="search-box">
      <div class="search-input">
        <button id="burgerBtn" class="burger-btn" aria-label="Toggle Controls">
          <i class="fas fa-bars"></i>
        </button>
        <input
          type="text"
          id="searchInput"
          placeholder="Search coffee shop..."
        />
        <button id="clearSearch"><i class="fas fa-times"></i></button>
      </div>
      <div class="control-buttons" id="controlButtons">
        <button id="locateBtn">
          <i class="fas fa-location-dot"></i> Find Me
        </button>
        <button id="toggleAutoCheckBtn">
          <i class="fas fa-bolt"></i> Auto Check-in OFF
        </button>
        <button id="resetBtn">
          <i class="fas fa-rotate-right"></i> Reset Data
        </button>
      </div>
    </div>

    <div id="map"></div>

    <div class="bottom-panel">
      <div class="drag-handle"></div>
      <div class="progress-container">
        <div class="panel-title" id="stats-text">Coffee-Dex: 0/0</div>
        <div class="progress-bar-bg">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <div class="list" id="list"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map("map").setView([-7.566, 110.824], 14);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(map);

      const listEl = document.getElementById("list");
      const statusText = document.getElementById("statusText");
      let coffeeData = [];
      let markers = [];
      let currentPosition = null;
      const PROXIMITY_RADIUS = 100; // dalam meter
      let autoCheckinEnabled = false;

      function updateStatus(message) {
        statusText.innerText = message;
      }

      // FUNGSI 1: Merender Map & Daftar (Dipanggil setiap kali ada perubahan data)
      function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      function renderApp() {
        listEl.innerHTML = ""; // Bersihkan list
        // Bersihkan marker lama dari peta agar tidak tumpuk
        markers.forEach((m) => map.removeLayer(m));
        markers = [];
        map.eachLayer((layer) => {
          if (
            layer instanceof L.CircleMarker &&
            layer.options?.className === "current-location-marker"
          ) {
            map.removeLayer(layer);
          }
        });

        const total = coffeeData.length;
        const visitedCount = coffeeData.filter((s) => s.visited).length;

        // Update UI Progress
        document.getElementById("stats-text").innerText =
          `Coffee-Dex: ${visitedCount}/${total}`;
        document.getElementById("progress-fill").style.width =
          `${(visitedCount / total) * 100}%`;

        coffeeData.forEach((shop, index) => {
          const isVisited = shop.visited;
          const logoUrl = shop.logo || shop.menu;
          const distance = currentPosition
            ? calculateDistance(
                currentPosition.lat,
                currentPosition.lng,
                shop.lat,
                shop.lng,
              )
            : null;
          const distanceInfo = distance
            ? `<p style="font-size:11px;color:${distance <= PROXIMITY_RADIUS ? "#1b5e20" : "#555"}; margin:2px 0">${Math.round(distance)}m away</p>`
            : "";

          // Create Marker Icon
          const icon = L.divIcon({
            className: `coffee-icon ${isVisited ? "visited" : "not-visited"}`,
            html: `<img src="${logoUrl}" style="${!isVisited ? "filter: brightness(0);" : ""}">`,
            iconSize: [45, 45],
            iconAnchor: [22, 45],
          });

          const marker = L.marker([shop.lat, shop.lng], { icon }).addTo(map);
          markers[index] = marker;

          // Popup Content dengan Tombol Unlock
          const unlockBtn = !isVisited
            ? `<button onclick="unlockShop(${index})" style="background:#ffcb05; border:none; padding:5px 10px; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:5px">🔓 Check-in</button>`
            : `<span style="color:green; font-weight:bold">✅ Collected</span>`;

          const proximityHint =
            !isVisited && distance && distance <= PROXIMITY_RADIUS
              ? `<p style="font-size:12px; color:#1b5e20; margin:3px 0">🚀 Within ${PROXIMITY_RADIUS}m, tap here to unlock</p>`
              : "";

          const popupContent = `
            <div style="text-align:center; min-width:180px">
                <b style="font-size:14px">${isVisited ? shop.nama : "??? Mystery Location ???"}</b><br>
                <hr>
                ${isVisited ? `<p style="font-size:12px">${shop.alamat}</p>` : `<p style="color:gray">Kunjungi tempat ini untuk unlock!</p>`}
                ${proximityHint}
                ${distanceInfo}
                ${unlockBtn}
            </div>
        `;
          marker.bindPopup(popupContent);

          // Tambah ke List Bawah
          const div = document.createElement("div");
          div.className = "item";
          div.dataset.index = index;
          if (!isVisited) div.style.opacity = "0.6";

          div.innerHTML = `
            <img src="${logoUrl}" style="${!isVisited ? "filter: brightness(0);" : ""}">
            <div>
                <h4>${isVisited ? shop.nama : "No. " + (index + 1) + " ?????"}</h4>
                <p>${isVisited ? shop.jam_buka : "Jam buka: Tersembunyi"}</p>
                ${distanceInfo}
            </div>
            ${!isVisited && distance && distance <= PROXIMITY_RADIUS ? '<span style="font-size:12px;color:#1b5e20; margin-left: auto;">Nearby!</span>' : ""}
          `;

          div.onclick = () => {
            map.flyTo([shop.lat, shop.lng], 16);
            marker.openPopup();
          };
          listEl.appendChild(div);
        });

        if (currentPosition) {
          L.circle([currentPosition.lat, currentPosition.lng], {
            radius: 8,
            color: "#1976d2",
            fillColor: "#1976d2",
            fillOpacity: 1,
            className: "current-location-marker",
          }).addTo(map);

          L.circle([currentPosition.lat, currentPosition.lng], {
            radius: PROXIMITY_RADIUS,
            color: "#1976d2",
            fillColor: "#1976d2",
            fillOpacity: 0.15,
            className: "current-location-marker",
          }).addTo(map);
        }

        if (autoCheckinEnabled) {
          tryAutoCheckin();
        }
        performSearch();
      }

      function tryAutoCheckin() {
        if (!currentPosition) {
          updateStatus("Aktifkan lokasi untuk auto-checkin.");
          return;
        }
        const nearby = coffeeData
          .map((shop, idx) => ({ shop, idx }))
          .filter(({ shop }) => !shop.visited)
          .filter(
            ({ shop }) =>
              calculateDistance(
                currentPosition.lat,
                currentPosition.lng,
                shop.lat,
                shop.lng,
              ) <= PROXIMITY_RADIUS,
          );

        if (nearby.length) {
          const next = nearby[0];
          updateStatus(`Auto check-in nearby: ${next.shop.nama}`);
          window.unlockShop(next.idx);
        } else {
          updateStatus(
            "Tidak ada coffee shop terdekat dalam radius auto-checkin.",
          );
        }
      }

      function locateMe() {
        if (!navigator.geolocation) {
          updateStatus("Geolocation tidak didukung browser.");
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            currentPosition = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
            };
            map.flyTo([currentPosition.lat, currentPosition.lng], 15);
            renderApp();
            updateStatus(
              "Lokasi ditemukan. Auto-checkin " +
                (autoCheckinEnabled ? "aktif" : "nonaktif") +
                ".",
            );
          },
          (err) => {
            updateStatus("Gagal mendapatkan lokasi: " + err.message);
          },
          { enableHighAccuracy: true, maximumAge: 10000, timeout: 10000 },
        );
      }

      function resetData() {
        if (
          confirm("Reset progres Coffee-Dex? Semua status visited akan hilang.")
        ) {
          localStorage.removeItem("mySoloCoffeeDex");
          coffeeData = coffeeData.map((shop) => ({ ...shop, visited: false }));
          renderApp();
          updateStatus("Progres di-reset.");
        }
      }

      // FUNGSI 2: Menandai Coffee Shop sudah dikunjungi
      window.unlockShop = function (index) {
        coffeeData[index].visited = true;
        // Simpan progres ke memori browser
        localStorage.setItem("mySoloCoffeeDex", JSON.stringify(coffeeData));
        renderApp();
        alert("🎉 Berhasil! Koleksi Coffee-Dex bertambah!");
      };

      // FUNGSI 3: Load Data Awal
      const savedData = localStorage.getItem("mySoloCoffeeDex");
      if (savedData) {
        coffeeData = JSON.parse(savedData);
        renderApp();
      } else {
        fetch("coffeeshop.json")
          .then((res) => res.json())
          .then((data) => {
            coffeeData = data;
            renderApp();
          })
          .catch((err) => console.error("Gagal load JSON:", err));
      }

      // Fitur Search (Tetap ada)
      const searchInput = document.getElementById("searchInput");
      const clearSearchButton = document.getElementById("clearSearch");
      const locateBtn = document.getElementById("locateBtn");
      const toggleAutoCheckBtn = document.getElementById("toggleAutoCheckBtn");
      const resetBtn = document.getElementById("resetBtn");
      const burgerBtn = document.getElementById("burgerBtn");
      const controlButtons = document.getElementById("controlButtons");
      let controlsOpen = false;

      function performSearch() {
        const filter = searchInput.value.toLowerCase();
        const items = document.querySelectorAll(".item");
        items.forEach((item) => {
          const idx = Number(item.dataset.index);
          const name = item.querySelector("h4").textContent.toLowerCase();
          const isVisible = name.includes(filter);
          item.style.display = isVisible ? "flex" : "none";
          if (markers[idx]) {
            if (isVisible) markers[idx].addTo(map);
            else map.removeLayer(markers[idx]);
          }
        });
        clearSearchButton.style.display = searchInput.value ? "inline" : "none";
      }

      searchInput.addEventListener("input", performSearch);
      clearSearchButton.addEventListener("click", () => {
        searchInput.value = "";
        performSearch();
        updateStatus("Pencarian dibersihkan.");
      });

      burgerBtn.addEventListener("click", () => {
        controlsOpen = !controlsOpen;
        controlButtons.classList.toggle("open", controlsOpen);
        burgerBtn.innerHTML = controlsOpen
          ? '<i class="fas fa-times"></i>'
          : '<i class="fas fa-bars"></i>';
      });

      locateBtn.addEventListener("click", () => {
        locateMe();
      });

      toggleAutoCheckBtn.addEventListener("click", () => {
        autoCheckinEnabled = !autoCheckinEnabled;
        toggleAutoCheckBtn.innerHTML = autoCheckinEnabled
          ? '<i class="fas fa-bolt"></i> Auto Check-in ON'
          : '<i class="fas fa-bolt"></i> Auto Check-in OFF';
        updateStatus(
          "Auto check-in " +
            (autoCheckinEnabled ? "diaktifkan" : "dinonaktifkan"),
        );
        if (autoCheckinEnabled) tryAutoCheckin();
      });

      resetBtn.addEventListener("click", resetData);
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((reg) => console.log("SW Registered!"))
            .catch((err) => console.log("SW Registration Failed", err));
        });
      }
    </script>
  </body>
</html>
