<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>-</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 1;
      }

      /* Bottom Panel */
      .bottom-panel {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        z-index: 999;
        overflow: hidden;
        max-height: 40%;
      }
      .drag-handle {
        width: 50px;
        height: 5px;
        background: #ccc;
        border-radius: 3px;
        margin: 8px auto;
      }
      .panel-title {
        text-align: center;
        font-weight: bold;
        padding: 5px 0;
        font-size: 16px;
      }
      .list {
        overflow-y: auto;
        max-height: calc(100% - 30px);
      }
      .item {
        display: flex;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: 0.2s;
      }
      .item:last-child {
        border-bottom: none;
      }
      .item:hover {
        background: #f0f0f0;
      }
      .item img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin-right: 10px;
        object-fit: cover;
      }
      .item div {
        flex: 1;
      }
      .item h4 {
        margin: 0;
        font-size: 14px;
        font-weight: bold;
      }
      .item p {
        margin: 2px 0 0;
        font-size: 12px;
        color: #555;
      }

      /* Search Bar */
      .search-box {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        z-index: 1000;
      }
      .search-input {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 40px;
        padding: 8px 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        transition: 0.2s;
      }
      .search-input:focus-within {
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25);
      }
      .search-input input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 14px;
        padding: 6px 8px;
        background: transparent;
      }
      .search-input .icon {
        width: 20px;
        height: 20px;
        color: #666;
        margin-right: 6px;
      }
      #clearSearch {
        border: none;
        background: none;
        font-size: 16px;
        cursor: pointer;
        color: #888;
        display: none;
      }
      #clearSearch:hover {
        color: #000;
      }

      /* Update Marker Icon */
      .coffee-icon {
        width: 45px !important;
        height: 45px !important;
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        background-color: white;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .coffee-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Efek Pokemon: Abu-abu jika belum dikunjungi */
      .not-visited {
        filter: grayscale(100%) brightness(0.7);
        border: 3px solid #666;
        opacity: 0.8;
      }

      /* Tambahan Progress Bar di atas List */
      .progress-container {
        padding: 10px 15px;
        background: #f8f9fa;
        border-bottom: 1px solid #eee;
      }

      .progress-bar-bg {
        width: 100%;
        height: 10px;
        background: #e0e0e0;
        border-radius: 5px;
        margin-top: 5px;
      }

      .progress-fill {
        height: 100%;
        background: #ffcb05; /* Warna Kuning Pokemon */
        width: 0%;
        border-radius: 5px;
        transition: width 0.5s ease-in-out;
      }
    </style>
  </head>

  <body>
    <div class="search-box">
      <div class="search-input">
        <input type="text" id="searchInput" placeholder=" . . . . " />
        <button id="clearSearch">✖</button>
      </div>
    </div>

    <div id="map"></div>

    <div class="bottom-panel">
      <div class="drag-handle"></div>
      <div class="progress-container">
        <div class="panel-title" id="stats-text">Coffee-Dex: 0/0</div>
        <div class="progress-bar-bg">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <div class="list" id="list"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      const map = L.map("map").setView([-7.566, 110.824], 14);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(map);

      const listEl = document.getElementById("list");
      let coffeeData = [];

      // FUNGSI 1: Merender Map & Daftar (Dipanggil setiap kali ada perubahan data)
      function renderApp() {
        listEl.innerHTML = ""; // Bersihkan list
        // Bersihkan marker lama dari peta agar tidak tumpuk
        map.eachLayer((layer) => {
          if (layer instanceof L.Marker) map.removeLayer(layer);
        });

        const total = coffeeData.length;
        const visitedCount = coffeeData.filter((s) => s.visited).length;

        // Update UI Progress
        document.getElementById("stats-text").innerText =
          `Coffee-Dex: ${visitedCount}/${total}`;
        document.getElementById("progress-fill").style.width =
          `${(visitedCount / total) * 100}%`;

        coffeeData.forEach((shop, index) => {
          const isVisited = shop.visited;
          const logoUrl = shop.logo || shop.menu;

          // Create Marker Icon
          const icon = L.divIcon({
            className: `coffee-icon ${isVisited ? "visited" : "not-visited"}`,
            html: `<img src="${logoUrl}" style="${!isVisited ? "filter: brightness(0);" : ""}">`,
            iconSize: [45, 45],
            iconAnchor: [22, 45],
          });

          const marker = L.marker([shop.lat, shop.lng], { icon }).addTo(map);

          // Popup Content dengan Tombol Unlock
          const popupContent = `
            <div style="text-align:center; min-width:150px">
                <b style="font-size:14px">${isVisited ? shop.nama : "??? Mystery Location ???"}</b><br>
                <hr>
                ${isVisited ? `<p style="font-size:12px">${shop.alamat}</p>` : `<p style="color:gray">Kunjungi tempat ini untuk unlock!</p>`}
                ${
                  !isVisited
                    ? `<button onclick="unlockShop(${index})" style="background:#ffcb05; border:none; padding:5px 10px; border-radius:15px; cursor:pointer; font-weight:bold; margin-top:5px">🔓 Check-in</button>`
                    : `<span style="color:green; font-weight:bold">✅ Collected</span>`
                }
            </div>
        `;
          marker.bindPopup(popupContent);

          // Tambah ke List Bawah
          const div = document.createElement("div");
          div.className = "item";
          if (!isVisited) div.style.opacity = "0.6";

          div.innerHTML = `
            <img src="${logoUrl}" style="${!isVisited ? "filter: brightness(0);" : ""}">
            <div>
                <h4>${isVisited ? shop.nama : "No. " + (index + 1) + " ?????"}</h4>
                <p>${isVisited ? shop.jam_buka : "Jam buka: Tersembunyi"}</p>
            </div>
        `;

          div.onclick = () => {
            map.flyTo([shop.lat, shop.lng], 16);
            marker.openPopup();
          };
          listEl.appendChild(div);
        });
      }

      // FUNGSI 2: Menandai Coffee Shop sudah dikunjungi
      window.unlockShop = function (index) {
        coffeeData[index].visited = true;
        // Simpan progres ke memori browser
        localStorage.setItem("mySoloCoffeeDex", JSON.stringify(coffeeData));
        renderApp();
        alert("🎉 Berhasil! Koleksi Coffee-Dex bertambah!");
      };

      // FUNGSI 3: Load Data Awal
      const savedData = localStorage.getItem("mySoloCoffeeDex");
      if (savedData) {
        coffeeData = JSON.parse(savedData);
        renderApp();
      } else {
        fetch("coffeeshop.json")
          .then((res) => res.json())
          .then((data) => {
            coffeeData = data;
            renderApp();
          })
          .catch((err) => console.error("Gagal load JSON:", err));
      }

      // Fitur Search (Tetap ada)
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", () => {
        const filter = searchInput.value.toLowerCase();
        const items = document.querySelectorAll(".item");
        items.forEach((item) => {
          const name = item.querySelector("h4").textContent.toLowerCase();
          item.style.display = name.includes(filter) ? "flex" : "none";
        });
      });
    </script>
  </body>
</html>
