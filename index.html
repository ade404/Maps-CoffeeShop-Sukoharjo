<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coffee Shop Map Sukoharjo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
}

#map{
position:absolute;
top:0;
bottom:0;
right:0;
left:0;
z-index:1;
}

/* search bar */

.search-box{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:500px;
z-index:1000;
}

.search-input{
display:flex;
align-items:center;
background:white;
border-radius:40px;
padding:8px 12px;
box-shadow:0 4px 20px rgba(0,0,0,0.15);
transition:0.2s;
}

.search-input:focus-within{
box-shadow:0 6px 25px rgba(0,0,0,0.25);
}

.search-input input{
flex:1;
border:none;
outline:none;
font-size:14px;
padding:8px;
}

.icon{
width:20px;
height:20px;
color:#666;
}

#clearSearch{
border:none;
background:none;
font-size:16px;
cursor:pointer;
color:#888;
display:none;
}

#clearSearch:hover{
color:#000;
}


/* bottom list */

.bottom-panel{
position:absolute;
bottom:0;
left:0;
right:0;
background:white;
border-radius:20px 20px 0 0;
max-height:40%;
overflow:auto;
z-index:999;
box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

.panel-header{
padding:10px;
text-align:center;
font-weight:bold;
border-bottom:1px solid #eee;
}

.item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.item:hover{
background:#f5f5f5;
}

.item h4{
margin:0;
font-size:14px;
}

.item p{
margin:4px 0;
font-size:12px;
color:#666;
}

/* desktop mode */

@media(min-width:768px){

.bottom-panel{
top:0;
width:320px;
max-height:100%;
border-radius:0;
}

#map{
left:320px;
}

.search{
left:calc(320px + 50%);
}

}

</style>

</head>

<body>

<div id="map"></div>

<div class="search-box">
  
  <div class="search-input">
    
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z"
      stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>

    <input 
      type="text"
      id="search"
      placeholder="Cari coffee shop..."
    >

    <button id="clearSearch">✕</button>

  </div>

</div>


<div class="bottom-panel">

<div class="panel-header">
☕ Coffee Shop Sukoharjo
</div>

<div id="list"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-7.683,110.83],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

var list=document.getElementById("list");

fetch("coffeeshop.json")
.then(res=>res.json())
.then(data=>{

data.forEach(shop=>{

var marker=L.marker([shop.lat,shop.lng]).addTo(map);

var popup=`
<b>${shop.nama}</b><br>
${shop.alamat}<br>
${shop.jam_buka}<br>
<img src="${shop.menu}" width="200">
`;

marker.bindPopup(popup);

var div=document.createElement("div");
div.className="item";

div.innerHTML=`
<h4>${shop.nama}</h4>
<p>${shop.alamat}</p>
`;

div.onclick=()=>{
map.setView([shop.lat,shop.lng],16);
marker.openPopup();
}

list.appendChild(div);

});

});


// search
document.getElementById("search").addEventListener("keyup",function(){

var keyword=this.value.toLowerCase();

document.querySelectorAll(".item").forEach(item=>{
item.style.display=item.innerText.toLowerCase().includes(keyword)?"block":"none";
});

});

</script>

</body>
</html>
